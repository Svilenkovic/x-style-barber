server {
    listen 80;
    server_name x.svilenkovic.rs www.x.svilenkovic.rs;
    include /etc/nginx/snippets/security-headers.conf;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name x.svilenkovic.rs www.x.svilenkovic.rs;
    include /etc/nginx/snippets/security-headers.conf;

    root /home/x.svilenkovic.rs/public_html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/x.svilenkovic.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x.svilenkovic.rs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~ /\. { deny all; }

    access_log /home/x.svilenkovic.rs/logs/access.log;
    error_log /home/x.svilenkovic.rs/logs/error.log;
}
